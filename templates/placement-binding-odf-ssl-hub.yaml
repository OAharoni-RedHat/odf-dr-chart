{{- if ((.Values.odfSslCertificateExtractor | default dict).enabled | default false) }}
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-odf-ssl-certificate-management-hub
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: odf-ssl-certificate-management
    app.kubernetes.io/component: placement-binding
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-wave: "3"
placementRef:
  name: placement-odf-ssl-hub
  kind: PlacementRule
  apiGroup: apps.open-cluster-management.io
subjects:
- name: policy-odf-ssl-certificate-management
  kind: Policy
  apiGroup: policy.open-cluster-management.io
{{- end }}
