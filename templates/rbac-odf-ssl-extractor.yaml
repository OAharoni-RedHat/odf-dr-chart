{{- if ((.Values.odfSslCertificateExtractor | default dict).enabled | default false) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: odf-ssl-extractor-sa
  namespace: {{ include "opp.clusterCaMgtNamespace" . }}
  labels:
    app.kubernetes.io/name: odf-ssl-certificate-management
    app.kubernetes.io/component: certificate-extraction
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# Hub-only permissions for the Job SA. Pushes to managed clusters use each cluster's imported kubeconfig
# (ACM admin-kubeconfig); those calls are authorized on the spoke, not by this ClusterRole.
# Workloads run in clusterCaMgt.namespace; cluster-proxy-ca-bundle remains in openshift-config.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: odf-ssl-extractor-role
  labels:
    app.kubernetes.io/name: odf-ssl-certificate-management
    app.kubernetes.io/component: certificate-extraction
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  resourceNames: ["router-ca"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["config.openshift.io"]
  resources: ["proxies"]
  verbs: ["get", "patch"]
- apiGroups: ["cluster.open-cluster-management.io"]
  resources: ["managedclusters"]
  verbs: ["get", "list"]
- apiGroups: ["internal.open-cluster-management.io"]
  resources: ["managedclusterinfos"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: odf-ssl-extractor-rolebinding
  labels:
    app.kubernetes.io/name: odf-ssl-certificate-management
    app.kubernetes.io/component: certificate-extraction
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
- kind: ServiceAccount
  name: odf-ssl-extractor-sa
  namespace: {{ include "opp.clusterCaMgtNamespace" . }}
roleRef:
  kind: ClusterRole
  name: odf-ssl-extractor-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
